{% extends "base.html" %}

{% block title %}Đăng ký thăm gặp{% endblock %}

{% block body %}
<section class="card p-5">
	<h1 class="title is-4 mb-2">Phiếu đăng ký thăm gặp</h1>
	<p class="subtitle is-6 has-text-grey mb-5">Mẫu này được tối ưu để tải nhanh và chạy ổn định trên máy cấu hình yếu.</p>

	<form method="post" action="/register" autocomplete="on">
		<div class="columns is-multiline">
			<div class="column is-12-mobile is-6-tablet">
				<label class="label" for="visitor_name">Họ và tên người thăm</label>
				<div class="control">
					<input class="input" type="text" id="visitor_name" name="visitor_name" required />
				</div>
			</div>

			<div class="column is-12-mobile is-6-tablet">
				<label class="label" for="visitor_phone">Số điện thoại</label>
				<div class="control">
					<input class="input" type="tel" id="visitor_phone" name="visitor_phone" required />
				</div>
			</div>

			<div class="column is-12-mobile is-6-tablet">
				<label class="label" for="inmate_name">Người được thăm</label>
				<div class="control">
					<input class="input" type="text" id="inmate_name" name="inmate_name" required />
				</div>
			</div>

			<div class="column is-12-mobile is-6-tablet">
				<label class="label" for="visit_date">Ngày thăm</label>
				<div class="control">
					<input class="input" type="date" id="visit_date" name="visit_date" required />
				</div>
			</div>

			<div class="column is-12">
				<label class="label" for="note">Ghi chú</label>
				<div class="control">
					<textarea class="textarea" id="note" name="note" rows="3" placeholder="Thông tin bổ sung (nếu có)"></textarea>
				</div>
			</div>
		</div>

		<div class="field is-grouped mt-3">
			<div class="control">
				<button type="submit" class="button is-link">Gửi đăng ký</button>
			</div>
			<div class="control">
				<a href="/" class="button is-light">Quay lại</a>
			</div>
		</div>
	</form>
</section>
{% endblock %}
