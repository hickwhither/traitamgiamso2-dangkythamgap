<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="/static/logo.png" />
	<title>HjhjHaha! · {% block title %}Meth{% endblock %}</title>

	<!-- Bulma CSS (lightweight, no JS dependency) -->
	<link
		rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/versions/bulma-no-dark-mode.css"
	/>

	<style>
		:root {
			--app-bg: #f7f8fa;
			--app-surface: #ffffff;
			--app-border: #e7eaf0;
		}

		html,
		body {
			background: var(--app-bg);
			color: #1f2937;
			font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			text-rendering: optimizeSpeed;
		}

		.app-main {
			padding-top: 4.25rem;
			padding-bottom: 1.5rem;
		}

		/* .surface-box {
			background: var(--app-surface);
			border: 1px solid var(--app-border);
			border-radius: 12px;
			padding: 1rem;
			box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
		} */

		.brand-logo {
			max-height: 24px;
			width: auto;
			vertical-align: middle;
		}

		@media (prefers-reduced-motion: reduce) {
			*,
			*::before,
			*::after {
				animation: none !important;
				transition: none !important;
				scroll-behavior: auto !important;
			}
		}
	</style>
</head>
<body>
	<nav class="navbar is-fixed-top is-white" role="navigation" aria-label="main navigation">
		<div class="container">
			<div class="navbar-brand">
				<a class="navbar-item" href="/" aria-label="Trang chủ">
					<img src="/static/logo.png" alt="Logo" class="brand-logo" loading="lazy" decoding="async" />
				</a>

				<button class="button navbar-burger" aria-label="menu" aria-expanded="false" data-target="main-navbar">
					<span aria-hidden="true"></span>
					<span aria-hidden="true"></span>
					<span aria-hidden="true"></span>
				</button>
			</div>

			<div id="main-navbar" class="navbar-menu">
				<div class="navbar-start">
					<a class="navbar-item" href="/">Trang chủ</a>
					<a class="navbar-item" href="/about">Giới thiệu</a>
					<a class="navbar-item" href="/register">Đăng ký thăm gặp</a>
				</div>
			</div>
		</div>
	</nav>

	<main class="app-main">
		<div class="container is-max-desktop px-3">
			{% with messages = get_flashed_messages(with_categories=true) %}
			{% if messages %}
			<section class="mb-4">
				{% for cate, mes in messages %}
				<article class="message {{ 'is-success' if cate == 'success' else 'is-warning' if cate == 'warning' else 'is-danger' if cate == 'danger' else 'is-info' }}">
					<div class="message-body">{{ mes | safe }}</div>
				</article>
				{% endfor %}
			</section>
			{% endif %}
			{% endwith %}

			{% block body %}{% endblock %}
		</div>
	</main>

	<script>
		(function () {
			var burger = document.querySelector('.navbar-burger');
			if (!burger) return;
			var targetId = burger.dataset.target;
			var target = document.getElementById(targetId);
			burger.addEventListener('click', function () {
				burger.classList.toggle('is-active');
				if (target) target.classList.toggle('is-active');
			});
		})();
	</script>

	{% block script %}{% endblock %}
</body>
</html>
